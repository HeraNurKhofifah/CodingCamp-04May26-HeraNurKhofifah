<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Life Dashboard</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <!-- ══════════════════════════════════════
       OVERLAY ONBOARDING
       Muncul jika belum ada 'username' di localStorage
  ══════════════════════════════════════ -->
  <div id="onboarding-overlay" class="onboarding-overlay">
    <div class="onboarding-card">
      <div class="onboarding-icon">👋</div>
      <h1 class="onboarding-title">Welcome to Life Dashboard</h1>
      <p class="onboarding-subtitle">Your personal productivity hub. Let's start with your name.</p>
      <div class="onboarding-form">
        <input
          id="onboarding-name-input"
          type="text"
          class="input"
          placeholder="Enter your name…"
          maxlength="30"
          autocomplete="off"
          aria-label="Your name"
        />
        <p id="onboarding-error" class="onboarding-error" role="alert"></p>
        <button id="onboarding-submit" class="btn btn-primary btn-full">
          Get Started →
        </button>
      </div>
    </div>
  </div>

  <!-- ══════════════════════════════════════
       MAIN DASHBOARD
       Tersembunyi di awal, muncul setelah onboarding
  ══════════════════════════════════════ -->
  <div id="main-dashboard" class="main-dashboard hidden">

    <!-- ── Header ── -->
    <header class="header">
      <div class="header-left">
        <div id="clock" class="clock" aria-live="polite" aria-label="Current time"></div>
        <div id="date-display" class="date-display"></div>
      </div>
      <div class="header-right">
        <button id="theme-toggle" class="btn-icon" aria-label="Toggle dark/light mode">🌙</button>
      </div>
    </header>

    <!-- ── Main Content ── -->
    <main class="container">

      <!-- Greeting -->
      <section id="greeting-section" class="card greeting-card" aria-label="Greeting">
        <div class="greeting-content">
          <p id="greeting-label" class="greeting-label"></p>
          <h2 id="greeting-name" class="greeting-name"></h2>
        </div>
        <button id="change-name-btn" class="btn-link" aria-label="Change name">
          ✏️ Change name
        </button>
      </section>

      <!-- Dashboard Grid -->
      <div class="dashboard-grid">

        <!-- ── Focus Timer ── -->
        <section class="card timer-card" aria-label="Focus Timer">
          <h2 class="card-title">🍅 Focus Timer</h2>
          <div id="timer-display" class="timer-display">25:00</div>
          <div class="timer-progress-wrap" aria-hidden="true">
            <div id="timer-progress" class="timer-progress"></div>
          </div>
          <div class="timer-controls">
            <button id="timer-start" class="btn btn-primary">▶ Start</button>
            <button id="timer-stop"  class="btn btn-secondary">⏸ Pause</button>
            <button id="timer-reset" class="btn btn-secondary">↺ Reset</button>
          </div>
          <div class="timer-set-row">
            <label for="timer-minutes">Set minutes:</label>
            <input
              id="timer-minutes"
              type="number"
              class="input input-small"
              min="1" max="99" value="25"
              aria-label="Timer duration in minutes"
            />
            <button id="timer-set-btn" class="btn btn-secondary btn-sm">Set</button>
          </div>
          <p id="timer-status" class="timer-status" aria-live="polite"></p>
        </section>

        <!-- ── To-Do List ── -->
        <section class="card todo-card" aria-label="To-Do List">
          <h2 class="card-title">✅ To-Do List</h2>
          <div class="todo-input-row">
            <input
              id="todo-input"
              type="text"
              class="input"
              placeholder="Add a new task…"
              maxlength="100"
              autocomplete="off"
              aria-label="New task input"
            />
            <button id="todo-add-btn" class="btn btn-primary">Add</button>
          </div>
          <p id="todo-warning" class="field-warning" role="alert" aria-live="assertive"></p>
          <div class="todo-toolbar">
            <span id="todo-count" class="badge"></span>
            <div class="sort-row">
              <label for="todo-sort">Sort:</label>
              <select id="todo-sort" class="input input-small" aria-label="Sort tasks">
                <option value="default">Default</option>
                <option value="az">A → Z</option>
                <option value="za">Z → A</option>
                <option value="done">Done last</option>
              </select>
            </div>
          </div>
          <ul id="todo-list" class="todo-list" aria-label="Task list"></ul>
          <p id="todo-empty" class="empty-msg">No tasks yet. Add one above!</p>
        </section>

        <!-- ── Quick Links ── -->
        <section class="card links-card" aria-label="Quick Links">
          <h2 class="card-title">🔗 Quick Links</h2>
          <div class="links-input-group">
            <input
              id="link-label-input"
              type="text"
              class="input"
              placeholder="Label"
              maxlength="30"
              autocomplete="off"
              aria-label="Link label"
            />
            <input
              id="link-url-input"
              type="url"
              class="input"
              placeholder="https://…"
              maxlength="200"
              autocomplete="off"
              aria-label="Link URL"
            />
            <button id="link-add-btn" class="btn btn-primary">Add</button>
          </div>
          <p id="link-warning" class="field-warning" role="alert" aria-live="assertive"></p>
          <div id="links-grid" class="links-grid" aria-label="Saved links"></div>
          <p id="links-empty" class="empty-msg">No links yet. Add your favorites!</p>
        </section>

      </div><!-- /dashboard-grid -->
    </main>
  </div><!-- /main-dashboard -->

  <script src="js/script.js"></script>
</body>
</html>
