<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Life Dashboard</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <!-- ── Header ── -->
  <header class="header">
    <div class="header-left">
      <div id="clock" class="clock"></div>
      <div id="date-display" class="date-display"></div>
    </div>
    <div class="header-right">
      <button id="theme-toggle" class="btn-icon" title="Toggle Dark/Light Mode" aria-label="Toggle theme">🌙</button>
    </div>
  </header>

  <!-- ── Main ── -->
  <main class="container">

    <!-- Greeting -->
    <section class="card greeting-card" aria-label="Greeting">
      <div class="greeting-content">
        <h1 id="greeting-text" class="greeting-text"></h1>
        <div class="name-row">
          <span id="greeting-name" class="greeting-name"></span>
          <button id="edit-name-btn" class="btn-link" title="Change name" aria-label="Edit name">✏️ <span class="btn-link-label">Edit name</span></button>
        </div>
      </div>
    </section>

    <!-- Name Modal -->
    <div id="name-modal" class="modal hidden" role="dialog" aria-modal="true" aria-labelledby="modal-title">
      <div class="modal-box">
        <h3 id="modal-title">What's your name?</h3>
        <input id="name-input" type="text" class="input" placeholder="Enter your name…" maxlength="30" autocomplete="off" />
        <div class="modal-actions">
          <button id="save-name-btn" class="btn btn-primary">Save</button>
          <button id="cancel-name-btn" class="btn btn-secondary">Cancel</button>
        </div>
      </div>
    </div>

    <!-- Dashboard Grid -->
    <div class="dashboard-grid">

      <!-- Focus Timer -->
      <section class="card timer-card" aria-label="Focus Timer">
        <h2 class="card-title">🍅 Focus Timer</h2>
        <div id="timer-display" class="timer-display" aria-live="polite" aria-label="Timer">25:00</div>
        <div class="timer-progress-wrap">
          <div id="timer-progress" class="timer-progress"></div>
        </div>
        <div class="timer-controls">
          <button id="timer-start" class="btn btn-primary">▶ Start</button>
          <button id="timer-stop"  class="btn btn-secondary">⏸ Pause</button>
          <button id="timer-reset" class="btn btn-secondary">↺ Reset</button>
        </div>
        <div class="timer-set-row">
          <label for="timer-minutes">Set minutes:</label>
          <input id="timer-minutes" type="number" class="input input-small" min="1" max="99" value="25" aria-label="Timer duration in minutes" />
          <button id="timer-set-btn" class="btn btn-secondary btn-sm">Set</button>
        </div>
        <p id="timer-status" class="timer-status"></p>
      </section>

      <!-- To-Do List -->
      <section class="card todo-card" aria-label="To-Do List">
        <h2 class="card-title">✅ To-Do List</h2>
        <div class="todo-input-row">
          <input id="todo-input" type="text" class="input" placeholder="Add a new task…" maxlength="100" autocomplete="off" aria-label="New task" />
          <button id="todo-add-btn" class="btn btn-primary">Add</button>
        </div>
        <p id="duplicate-warning" class="duplicate-warning" role="alert" aria-live="assertive"></p>
        <div class="todo-toolbar">
          <span class="todo-count" id="todo-count"></span>
          <div class="sort-row">
            <label for="todo-sort">Sort:</label>
            <select id="todo-sort" class="input input-small" aria-label="Sort tasks">
              <option value="default">Default</option>
              <option value="az">A → Z</option>
              <option value="za">Z → A</option>
              <option value="done">Done last</option>
            </select>
          </div>
        </div>
        <ul id="todo-list" class="todo-list" aria-label="Task list"></ul>
        <p id="todo-empty" class="empty-msg">No tasks yet. Add one above!</p>
      </section>

      <!-- Quick Links -->
      <section class="card links-card" aria-label="Quick Links">
        <h2 class="card-title">🔗 Quick Links</h2>
        <div class="links-input-group">
          <input id="link-name-input" type="text"  class="input" placeholder="Label"        maxlength="30"  autocomplete="off" aria-label="Link label" />
          <input id="link-url-input"  type="url"   class="input" placeholder="https://…"   maxlength="200" autocomplete="off" aria-label="Link URL" />
          <button id="link-add-btn" class="btn btn-primary">Add</button>
        </div>
        <p id="link-error" class="link-error" role="alert" aria-live="assertive"></p>
        <div id="links-grid" class="links-grid" aria-label="Saved links"></div>
        <p id="links-empty" class="empty-msg">No links yet. Add your favorites!</p>
      </section>

    </div><!-- /dashboard-grid -->
  </main>

  <script src="js/app.js"></script>
</body>
</html>
